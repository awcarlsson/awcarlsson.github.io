  <aside class="artboard-controls">
    <div class="control-group">
      <label class="control-label" for="slider1">height</label>
      <input id="slider1" type="range" min="0" max="250">

    <div class="control-group">
      <label class="control-label" for="slider2">branches</label>
      <input id="slider2" type="range" min="0" max="200">
    </div>

</section>

<script src="p5.js" id="module"></script>
